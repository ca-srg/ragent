name: Auto-approve E2E Tests

on:
  workflow_run: # zizmor: ignore[dangerous-triggers] No checkout; only uses metadata to call the deployments API.
    workflows: ["E2E Tests"]
    types: [requested]

concurrency:
  group: auto-approve-e2e-${{ github.event.workflow_run.id }}
  cancel-in-progress: false # An in-progress approval must not be cancelled.

permissions: {}

jobs:
  auto-approve:
    name: Auto-approve for maintainers
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      actions: write # Required to approve pending deployments.

    steps:
      - name: Auto-approve if actor is a maintainer
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
        run: |
          # Check if the actor has write, maintain, or admin access.
          PERMISSION=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" \
            --jq '.permission' 2>/dev/null || echo "none")

          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" && "$PERMISSION" != "maintain" ]]; then
            echo "Actor $ACTOR has $PERMISSION access — requires manual approval."
            exit 0
          fi

          echo "Actor $ACTOR has $PERMISSION access — auto-approving."

          for attempt in $(seq 1 36); do
            ENV_IDS_JSON=$(gh api "repos/$REPO/actions/runs/$RUN_ID/pending_deployments" \
              --jq '[.[] | select(.current_user_can_approve) | .environment.id] | unique')

            if [[ "$ENV_IDS_JSON" == "[]" ]]; then
              echo "No approvable pending deployments yet (attempt $attempt/36)"
              sleep 5
              continue
            fi

            echo "Approving environments: $ENV_IDS_JSON (attempt $attempt/36)"
            BODY=$(jq -n \
              --argjson ids "$ENV_IDS_JSON" \
              --arg comment "Auto-approved: $ACTOR has $PERMISSION access." \
              '{environment_ids: $ids, state: "approved", comment: $comment}')

            if echo "$BODY" | gh api "repos/$REPO/actions/runs/$RUN_ID/pending_deployments" \
              --method POST --input - 2>/dev/null; then
              echo "Approved successfully."
              exit 0
            fi

            echo "POST failed — retrying in 5 s…"
            sleep 5
          done

          echo "::warning::Failed to approve pending deployments after 3 min."
          exit 1
