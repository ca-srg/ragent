name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        env:
          SECRET_MANAGER_REGION: ${{ secrets.SECRET_MANAGER_REGION }}
          SECRET_MANAGER_SECRET_ID: ${{ secrets.SECRET_MANAGER_SECRET_ID }}
        run: go test $(go list ./... | grep -v '/tests/') -timeout 120s
